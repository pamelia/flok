# flok configuration
#
# Copy this file to ~/.config/flok/flok.toml (or project-local flok.toml or
# .flok/flok.toml) and edit as needed.
#
# API keys are read ONLY from this file at runtime — environment variables
# are NOT consulted. Set a key interactively via:
#
#     flok auth login --provider <anthropic|openai|deepseek|minimax>
#
# The CLI writes ~/.config/flok/flok.toml with mode 0600 on Unix.

# Default model to use when the `--model` CLI flag is not given. Accepts any
# alias supported by `flok models` (e.g. "sonnet", "opus-4.7", "gpt-5.4") or
# a full ID like "anthropic/claude-opus-4-7".
# model = "opus-4.7"

# Anthropic provider configuration
[provider.anthropic]
# api_key = "sk-ant-..."       # Set via: flok auth login --provider anthropic
# default_model = "opus-4.7"   # Fallback model when `model` above is unset.
# fallback = ["openai"]        # Try OpenAI automatically on 429/5xx/529

# OpenAI provider configuration
[provider.openai]
# api_key = "sk-..."           # Set via: flok auth login --provider openai
# base_url = "https://api.openai.com/v1"   # Override for compatible APIs
# default_model = "gpt-5.4"
# fallback = ["anthropic"]

# DeepSeek provider configuration (uses OpenAI-compatible API)
[provider.deepseek]
# api_key = "sk-..."           # Set via: flok auth login --provider deepseek
# base_url = "https://api.deepseek.com/v1"
# default_model = "deepseek"

# MiniMax provider configuration (uses Anthropic-compatible API)
[provider.minimax]
# api_key = "..."              # Set via: flok auth login --provider minimax
# default_model = "minimax"

[agents.explore]
# model = "haiku"                            # Preferred model for this built-in agent
# fallback_models = ["minimax", "nano"]    # Replaces provider fallback chain for this agent
# prompt_append = "Be concise."              # Appended to the built-in system prompt

[runtime_fallback]
# enabled = true
# retry_on_errors = [429, 500, 502, 503, 529]
# max_attempts = 3              # Total attempts across primary + fallbacks
# cooldown_seconds = 120        # Provider-wide cooldown after retriable failure
# notify_on_fallback = true     # Emit inline fallback notices in the TUI
