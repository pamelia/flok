# flok configuration
# Copy this file to flok.toml and edit as needed.
# Environment variables take precedence over config file values.

# Anthropic provider configuration
[provider.anthropic]
# api_key = "sk-ant-..."   # Or set ANTHROPIC_API_KEY env var

# OpenAI provider configuration
[provider.openai]
# api_key = "sk-..."       # Or set OPENAI_API_KEY env var
# base_url = "https://api.openai.com/v1"   # Override for compatible APIs

# DeepSeek provider configuration (uses OpenAI-compatible API)
[provider.deepseek]
# api_key = "sk-..."       # Or set DEEPSEEK_API_KEY env var
# base_url = "https://api.deepseek.com/v1"

# MiniMax provider configuration (uses Anthropic-compatible API)
[provider.minimax]
# api_key = "..."          # Or set MINIMAX_API_KEY env var
